    // Рендер карточек рекомендаций
    function renderRecCards() {
        return recommendationsList.map(rec => `
            <div class="rec-card">
                <div class="rec-category">📌 ${rec.category}</div>
                <div class="rec-title">${rec.title}</div>
                <div class="rec-description">${rec.desc}</div>
                <div class="stores-section">
                    <div class="stores-label">Где купить:</div>
                    ${rec.stores.map(s => `<div class="store-item"><span>${s.name}</span><span class="store-distance">${s.dist}</span></div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    // Обновление флага showRecommendations на основе наличия генетических файлов
    function updateRecommendationsFlag() {
        showRecommendations = uploadedFiles.some(f => f.isGenetic === true);
        rerender();
    }

    // Закрыть модальное окно и обновить флаг
    function closeModalAndShowRecs() {
        if (modalTimer) clearTimeout(modalTimer);
        showModal = false;
        updateRecommendationsFlag();
    }

    // Показать модальное окно с прогрессом на 2 секунды
    function showAnalysisModal() {
        if (modalTimer) clearTimeout(modalTimer);
        showModal = true;
        modalProgress = 0;
        modalMessage = 'Чтение файла...';
        rerender();

        // Анимация прогресса
        let progress = 0;
        const interval = setInterval(() => {
            if (progress < 100) {
                progress += 20;
                modalProgress = progress;
                if (progress === 40) modalMessage = 'Извлечение данных...';
                if (progress === 70) modalMessage = 'Формирование рекомендаций...';
                if (progress === 100) modalMessage = 'Готово!';
                rerender();
            } else {
                clearInterval(interval);
                // Закрываем модалку через 300 мс
                modalTimer = setTimeout(() => {
                    closeModalAndShowRecs();
                }, 300);
            }
        }, 350);
    }

    // Удаление файла
    function deleteFile(index) {
        uploadedFiles.splice(index, 1);
        // Если удалили все генетические файлы, рекомендации пропадут
        updateRecommendationsFlag();
    }

    // Обработчик загрузки файлов
    function handleFileUpload(e) {
        const files = e.target.files;
        if (!files || files.length === 0) return;
        
        let addedGenetic = false;
        for (let f of files) {
            const isGenetic = f.name.toLowerCase().includes('днк') || f.name.toLowerCase().includes('dna') ||
                              f.name.toLowerCase().includes('анализ') || f.name.toLowerCase().includes('крови') ||
                              f.name.toLowerCase().includes('биохимия') || f.name.toLowerCase().includes('тест');
            uploadedFiles.push({
                name: f.name,
                size: (f.size / (1024*1024)).toFixed(1) + ' МБ',
                date: new Date().toLocaleDateString('ru-RU'),
                isGenetic: isGenetic
            });
            if (isGenetic) addedGenetic = true;
        }
        
        // Если загружен хотя бы один генетический файл — показываем модальное окно
        if (addedGenetic) {
            showAnalysisModal();
        } else {
            // Если файлы не распознаны как анализы, просто обновляем список без модалки
            updateRecommendationsFlag();
        }
        // Очищаем input, чтобы можно было загрузить те же файлы повторно
        e.target.value = '';
    }

    // Авторизация / регистрация (простая имитация)
    function doLogin(email, pwd) { if(email && pwd) { isLoggedIn = true; currentScreen = 'dashboard'; rerender(); } else alert('Введите email и пароль'); }
    function doRegister(name, email, pwd, city, birth) { if(name && email && pwd && city && birth) { user = { name, email, city, birthday: birth }; isLoggedIn = true; currentScreen = 'dashboard'; rerender(); } else alert('Заполните все поля'); }
    function logout() { isLoggedIn = false; currentScreen = 'landing'; rerender(); }

    // ------ ОТРИСОВКА ЭКРАНОВ ------
    function renderNav() {
        return `
            <nav class="nav">
                <button class="nav-link" onclick="window.app.goTo('landing')">На главную</button>
                ${!isLoggedIn ? 
                    `<button class="nav-link" onclick="window.app.goTo('login')">Вход</button>
                     <button class="nav-link" onclick="window.app.goTo('register')">Регистрация</button>` :
                    `<button class="nav-link" onclick="window.app.goTo('dashboard')">Личный кабинет</button>
                     <button class="nav-link" onclick="window.app.goTo('recommendations')">Рекомендации</button>
                     <button class="nav-link" onclick="window.app.logout()">Выйти</button>`
                }
            </nav>
        `;
    }

    function renderLanding() {
        return `
            ${renderNav()}
            <div class="hero">
                <h1 class="title">Персонализированная генетика для вашего здоровья</h1>
                <p class="subtitle">Откройте свой генетический потенциал. Персональные рекомендации по тренировкам, питанию, уходу за кожей и витаминам.</p>
            </div>
            <div class="services-row">
                <div class="service-card"><div class="service-icon">${iconTraining}</div><h3>Тренировки</h3><p>Персонализированная программа на основе генетического профиля</p></div>
                <div class="service-card"><div class="service-icon">${iconNutrition}</div><h3>Питание</h3><p>Индивидуальный план питания с учётом метаболизма</p></div>
                <div class="service-card"><div class="service-icon">${iconSkincare}</div><h3>Уход за кожей</h3><p>Рекомендации по уходу на основе ДНК</p></div>
                <div class="service-card"><div class="service-icon">${iconNutrients}</div><h3>Нутриенты</h3><p>Подбор витаминов и добавок</p></div>
            </div>
            <div class="how-section">
                <h2 class="section-title">Как это работает</h2>
                <div class="steps">
                    <div class="step"><div class="step-number">01</div><h3>Загрузите результаты</h3><p>Загрузите результаты ваших ДНК-тестов и анализов</p></div>
                    <div class="step"><div class="step-number">02</div><h3>Получите рекомендации</h3><p>Получите персонализированные рекомендации по здоровью</p></div>
                </div>
            </div>
            <footer class="footer">© 2026 Персонализированная генетика для вашего здоровья.</footer>
        `;
    }

    function renderLogin() {
        return `
            ${renderNav()}
            <div class="auth-container">
                <div class="auth-card">
                    <h2 class="auth-title">Вход в систему</h2>
                    <p class="auth-subtitle">Войдите в личный кабинет</p>
                    <input type="email" id="loginEmail" class="input" placeholder="Email">
                    <input type="password" id="loginPwd" class="input" placeholder="Пароль">
                    <button class="forgot-password">Забыли пароль?</button>
                    <button class="button" onclick="window.app.loginAction()">Войти →</button>
                    <p class="auth-footer">Нет аккаунта? <button class="link-button" onclick="window.app.goTo('register')">Зарегистрироваться</button></p>
                    <p class="terms">Входя в систему, вы соглашаетесь с условиями использования</p>
                </div>
            </div>
        `;
    }

    function renderRegister() {
        return `
            ${renderNav()}
            <div class="auth-container">
                <div class="auth-card">
                    <h2 class="auth-title">Регистрация</h2>
                    <p class="auth-subtitle">Создайте новый аккаунт</p>
                    <input type="text" id="regName" class="input" placeholder="Имя">
                    <input type="email" id="regEmail" class="input" placeholder="Email">
                    <input type="password" id="regPwd" class="input" placeholder="Пароль">
                    <input type="text" id="regCity" class="input" placeholder="Город">
                    <input type="date" id="regBirth" class="input" placeholder="Дата рождения">
                    <button class="button" onclick="window.app.registerAction()">Зарегистрироваться →</button>
                    <p class="auth-footer">Уже есть аккаунт? <button class="link-button" onclick="window.app.goTo('login')">Войти</button></p>
                </div>
            </div>
        `;
    }

    function renderDashboard() {
        return `
            ${renderNav()}
            ${showModal ? `
            <div class="modal-overlay">
                <div class="modal-card">
                    <div class="modal-icon">🧬</div>
                    <div class="modal-title">Анализ файла</div>
                    <div class="modal-message">${modalMessage}</div>
                    <div class="progress-bar-bg"><div class="progress-fill" style="width: ${modalProgress}%;"></div></div>
                    <div style="font-size:14px; margin-top:8px;">${modalProgress}%</div>
                </div>
            </div>
            ` : ''}
            <div class="dashboard-wrap">
                <div class="profile-card">
                    <h2 class="dashboard-title">Личный кабинет</h2>
                    <div class="profile-info">
                        <h3>${user.name}</h3>
                        <p>Email: ${user.email}</p>
                        <p>Город: ${user.city}</p>
                        <p>Дата рождения: ${new Date(user.birthday).toLocaleDateString('ru-RU')}</p>
                    </div>
                </div>
                <div class="upload-card">
                    <h3 class="section-subtitle">Результаты ДНК-теста и анализы</h3>
                    <div class="upload-area">
                        <p>📎 Перетащите файлы или нажмите для выбора</p>
                        <label class="file-label">Выбрать файлы
                            <input type="file" multiple accept=".pdf,.jpg,.png,.doc,.docx" class="file-input" onchange="window.app.uploadEvent(event)">
                        </label>
                        <p class="file-hint">Поддерживаемые форматы: PDF, JPG, PNG, DOC, DOCX</p>
                    </div>
                    <div class="files-list">
                        <h4>Загруженные файлы (${uploadedFiles.length})</h4>
                        ${uploadedFiles.length === 0 ? '<div style="color:#8b9abb; padding:12px 0;">Нет загруженных файлов. Загрузите результаты ДНК-теста или анализов, чтобы получить персональные рекомендации.</div>' : ''}
                        ${uploadedFiles.map((f, idx) => `
                            <div class="file-item">
                                <span>📄 ${f.name} ${f.isGenetic ? '<span class="badge-genetic">🔬 Результаты анализов</span>' : ''}</span>
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <span class="file-meta">${f.size} • ${f.date}</span>
                                    <button class="delete-file" onclick="window.app.deleteFile(${idx})">🗑 Удалить</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ${showRecommendations && !showModal ? `
                <div class="recommendations-block">
                    <div class="recs-header">
                        <h3>✨ Персональные рекомендации</h3>
                        <p>На основе ваших анализов и ДНК-теста мы подобрали для вас:</p>
                    </div>
                    <div class="recommendations-grid">
                        ${renderRecCards()}
                    </div>
                </div>
                ` : ''}
                ${!showRecommendations && uploadedFiles.length > 0 && !showModal ? '<div class="info-decode" style="background:#f0f3fa; border-radius:24px; padding:16px; margin-top:20px; text-align:center;">📋 Среди загруженных файлов не обнаружено результатов анализов или ДНК-теста. Загрузите файл с названием, содержащим "ДНК", "анализ", "крови" и т.д.</div>' : ''}
            </div>
        `;
    }

    function renderFullRecommendations() {
        return `
            ${renderNav()}
            <div style="max-width:1300px; margin:0 auto; padding:48px 24px;">
                <h2 style="font-size:28px; font-weight:700; color:#1e2f4e; text-align:center;">Персонализированные рекомендации</h2>
                <p style="text-align:center; color:#5a6e8a; margin-bottom:42px;">На основе ваших анализов и ДНК-теста</p>
                <div class="recommendations-grid">
                    ${renderRecCards()}
                </div>
            </div>
        `;
    }

    function rerender() {
        const root = document.getElementById('root');
        if (!root) return;
        let html = '';
        if (currentScreen === 'landing') html = renderLanding();
        else if (currentScreen === 'login') html = renderLogin();
        else if (currentScreen === 'register') html = renderRegister();
        else if (currentScreen === 'dashboard') html = renderDashboard();
        else if (currentScreen === 'recommendations') html = renderFullRecommendations();
        root.innerHTML = html;
    }

    window.app = {
        goTo: (s) => { currentScreen = s; rerender(); },
        loginAction: () => { const email = document.getElementById('loginEmail')?.value; const pwd = document.getElementById('loginPwd')?.value; doLogin(email, pwd); },
        registerAction: () => { const n = document.getElementById('regName')?.value; const e = document.getElementById('regEmail')?.value; const p = document.getElementById('regPwd')?.value; const c = document.getElementById('regCity')?.value; const b = document.getElementById('regBirth')?.value; doRegister(n, e, p, c, b); },
        uploadEvent: (e) => handleFileUpload(e),
        deleteFile: (idx) => deleteFile(idx),
        logout: () => logout()
    };
    rerender();
</script>
</body>
</html>
